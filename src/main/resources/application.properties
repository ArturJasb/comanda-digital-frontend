# ============================================================
# Comanda Digital - Application Configuration
# UNASP SP - Prof. Thiago Silva - 2026/1
# ============================================================

spring.application.name=comanda-digital

# ============================================================
# DATASOURCE - MySQL
# Os defaults sao para localhost. Para sobrescrever, defina
# as variaveis de ambiente DB_HOST, DB_PORT, DB_NAME,
# DB_USER, DB_PASSWORD antes de rodar.
# ============================================================
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:comanda_digital}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Sao_Paulo&createDatabaseIfNotExist=true
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:luigieusoubom13A!}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection pool (HikariCP - padrao Spring Boot)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000

# ============================================================
# JPA / Hibernate
# ============================================================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ============================================================
# Flyway - migrations versionadas
# ============================================================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true

# ============================================================
# JWT
# ============================================================
jwt.secret=${JWT_SECRET:comanda-digital-secret-key-unasp-sp-2026-muito-longa-para-hs256-precisa-no-minimo-32-bytes}
jwt.expiration=${JWT_EXPIRATION:28800000}

# ============================================================
# Server
# ============================================================
server.port=${SERVER_PORT:8080}
server.error.include-stacktrace=never
server.error.include-message=always

# ============================================================
# SpringDoc / Swagger
# ============================================================
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true

# ============================================================
# Jackson
# ============================================================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=America/Sao_Paulo
spring.jackson.default-property-inclusion=NON_NULL

# ============================================================
# Logging
# ============================================================
logging.level.root=INFO
logging.level.com.unasp.comandadigital=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
